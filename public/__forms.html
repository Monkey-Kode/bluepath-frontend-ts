<!--
  Static form definitions for Netlify Forms detection. Netlify parses this
  static HTML at deploy time and registers each <form name="..."> so AJAX
  POSTs from the React forms are accepted into the existing Forms inbox.
  Keep field names in sync with the JSX forms (components/FormBasic.tsx,
  components/Form.tsx). Add a new <form> here when a new Sanity form page
  is created.
-->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Netlify form definitions</title>
    </head>
    <body>
        <form name="events" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
            <input type="hidden" name="form-name" value="events" />
            <input type="text" name="event-name" />
            <input type="text" name="name" />
            <input type="text" name="company" />
            <input type="text" name="title" />
            <input type="email" name="email" />
            <input type="text" name="details" />
            <input name="bot-field" />
        </form>

        <form
            name="Case Study Request"
            data-netlify="true"
            data-netlify-honeypot="bot-field"
            hidden
        >
            <input type="hidden" name="form-name" value="Case Study Request" />
            <input type="text" name="name" />
            <input type="text" name="company" />
            <input type="text" name="position" />
            <input type="email" name="email" />
            <input type="tel" name="phone" />
            <input type="text" name="state" />
            <textarea name="message"></textarea>
            <input name="bot-field" />
        </form>
    </body>
</html>
