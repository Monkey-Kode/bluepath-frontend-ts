[build]
command = "pnpm run build"
publish = ".next"
# `.next` is the publish dir for the Netlify Next.js Runtime. This is an
# existing Gatsby site, so Netlify's framework auto-detection does NOT kick
# in and the runtime is NOT auto-installed — it must be declared explicitly
# below, or .next ships as dead static files (blank site, no SSR/routing).
# Do NOT set `functions`; the runtime owns serverless/edge output.
# Redirects are ported to next.config.ts redirects().

# Netlify Next.js Runtime — REQUIRED for App Router SSR/RSC/middleware.
# Without this the deploy is "ready" but serves nothing.
[[plugins]]
package = "@netlify/plugin-nextjs"

[dev]
command = "pnpm run dev"
