[build]
command = "pnpm run build"
publish = ".next"
# `.next` is Netlify's documented publish dir for Next.js SSR/hybrid.
# Set explicitly (not omitted): this is an existing Gatsby site, so a stale
# UI/Gatsby publish setting could otherwise win. Do NOT set `functions` —
# the OpenNext adapter (auto-installed on Next detection) owns serverless
# /edge function output. Redirects are ported to next.config.ts redirects().

[dev]
command = "pnpm run dev"
